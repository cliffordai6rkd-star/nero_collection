# Static calibration never changes this collection config. It only reuses the
# follower CAN endpoint and firmware settings.
collection_config: ../configs/master_slave_can.yaml
pair: main

model:
  urdf_path: ../urdf/nero/nero_with_gripper.urdf
  locked_joint_names: [gripper, gripper_joint1, gripper_joint2]
  terminal_joint_name: joint7
  gravity_m_s2: [0.0, 0.0, -9.81]

motion:
  command_rate_hz: 30.0
  joint_speed_rad_s: 0.12  # 五次 minimum-jerk 轨迹的最大关节速度，约 6.9 deg/s
  max_step_rad: 0.01
  max_motion_velocity_rad_s: 0.4
  motion_timeout_s: 20.0
  settle_timeout_s: 8.0
  settle_duration_s: 1.0
  sample_rate_hz: 100.0
  sample_duration_s: 2.0
  max_static_velocity_rad_s: 0.02
  max_position_error_rad: 0.02
  round_count: 3
  alternate_reverse: true

safety:
  # The collector refuses to move until every pose has been checked on the
  # real workcell and this is changed to true.
  approved: true
  joint_limit_margin_rad: 0.05
  max_abs_torque_nm: [20.0, 20.0, 12.0, 12.0, 6.0, 6.0, 6.0]

