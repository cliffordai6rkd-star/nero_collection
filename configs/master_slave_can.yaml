gripper:
  enabled: true
  effector: AGX_GRIPPER
  attach_to: both
  teleop_enabled: true
  scale: 1.0
  offset_m: 0.0
  min_width_m: 0.0
  max_width_m: 0.1
  force_n: 1.0
  command_rate_hz: 30.0
  deadband_m: 0.0005
  keepalive_s: 0.5

robot_states:
  q:
    enabled: true
    lowpass: false
  velocity:
    enabled: true
    lowpass: false
  acceleration:
    enabled: true
    lowpass: true
    # 仅用于录制期间的兼容预览；H5 规范 dq/ddq 在保存时由 q(t) 样条解析计算。
    velocity_lowpass_cutoff_hz: 10.0
  ee_pose:
    enabled: true
    lowpass: false
  torque:
    enabled: true
    # 仅用于录制期间的实时预览；H5 规范 tau 使用 dynamics_processing 的零相位滤波。
    lowpass: true
    lowpass_cutoff_hz: 10.0
    median_window: 3
  current:
    enabled: true
    lowpass: true
    lowpass_cutoff_hz: 10.0
    median_window: 3
